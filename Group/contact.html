<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
      integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <title>Kontakt / Reservasjon</title>
    <link rel="stylesheet" href="styles/style.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="header">
      <a href="index.html" class="logo">
        <img src="images/logo.png" alt="logo" />
      </a>

      <nav class="navbar">
        <a href="index.html">Hjem</a>
        <a href="about.html">Om</a>
        <a href="menu.html">Meny</a>
        <a href="produkter.html">Produkter</a>
        <a href="review.html">Anmeldelse</a>
        <a href="contact.html" class="active">Kontakt</a>
        <a href="blogs.html">Blogger</a>
      </nav>

      <div class="buttons">
        <button id="search-btn"><i class="fas fa-search"></i></button>
        <button id="cart-btn"><i class="fas fa-shopping-cart"></i></button>
        <button id="menu-btn"><i class="fas fa-bars"></i></button>
      </div>

      <div class="search-form">
        <input
          type="text"
          class="search-input"
          placeholder="Søk..."
        />
        <i class="fas fa-search"></i>
      </div>

      <div class="cart-items-container">
        <div class="cart-item">
          <i class="fas fa-times"></i>
          <img src="images/menu-1.png" alt="" />
          <div class="content">
            <h3>Produkt</h3>
            <div class="price">149 Kr</div>
          </div>
        </div>
        <a href="#" class="btn">Til kassen</a>
      </div>
    </header>

    <!-- CONTACT / RESERVATION -->
    <section class="contact" id="contact">
      <h1 class="heading">kontakt <span>oss</span></h1>

      <div class="row">
        <iframe
          class="map"
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d32484.03962338796!2d9.03045099963059!3d59.412183287771!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x46474948572a1bab%3A0x801b4c99277effbb!2zQsO4!5e0!3m2!1sno!2sno!4v1712565844461!5m2!1sno!2sno"
          loading="lazy"
        ></iframe>

        <!-- RESERVATION FORM -->
        <form id="reservation-form">
          <h3>Reserver bord</h3>

          <div class="inputBox">
            <i class="fas fa-user"></i>
            <input type="text" id="fullName" placeholder="Fullt navn" required />
          </div>

          <div class="inputBox">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="E-post" required />
          </div>

          <div class="inputBox">
            <i class="fas fa-phone"></i>
            <input type="text" id="phone" placeholder="Telefon" />
          </div>

          <div class="inputBox">
            <i class="fas fa-calendar"></i>
            <input type="date" id="date" required />
          </div>

          <div class="inputBox">
            <i class="fas fa-clock"></i>
            <input type="time" id="time" required />
          </div>

          <div class="inputBox">
            <i class="fas fa-users"></i>
            <input type="number" id="guestCount" placeholder="Antall personer" required />
          </div>

          <button type="submit" class="btn">Reserver nå</button>
        </form>
      </div>

      <p id="reservation-message"></p>
    </section>

    <!-- FOOTER -->
    <section class="footer">
      <div class="search">
        <input type="text" class="search-input" placeholder="Søk" />
        <button class="btn btn-primary">Søk</button>
      </div>

      <div class="share">
        <a href="#" class="fab fa-facebook"></a>
        <a href="#" class="fab fa-twitter"></a>
        <a href="#" class="fab fa-instagram"></a>
        <a href="#" class="fab fa-linkedin"></a>
      </div>

      <div class="links">
        <a href="index.html">Hjem</a>
        <a href="about.html">Om</a>
        <a href="menu.html">Meny</a>
        <a href="produkter.html">Produkter</a>
        <a href="review.html">Anmeldelse</a>
        <a href="contact.html" class="active">Kontakt</a>
        <a href="blogs.html">Blogger</a>
      </div>

      <div class="credit">
        Laget av <span>Group 7</span> | Alle rettigheter forbeholdt
      </div>
    </section>

    <script src="js/script.js"></script>
    <script src="js/reservations.js"></script>
  </body>
</html>
