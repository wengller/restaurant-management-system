<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Produkter</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"/>
  <link rel="stylesheet" href="styles/style.css"/>

  <style>
    .products-page {
      padding: 3.5rem 7%;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
    }

    .product-card {
      background: #fff;
      padding: 2rem;
      border-radius: 2rem;
      text-align: center;
      box-shadow: 0 0.5rem 1.5rem rgba(0,0,0,0.2);
    }

    .product-card img {
      width: 100%;
      height: 14rem;
      object-fit: contain;
      margin-bottom: 1rem;
    }

    .product-card h2 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .product-card p {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }

    .product-card strong {
      display: block;
      font-size: 1.8rem;
      color: var(--main-color);
      margin-bottom: 1rem;
    }

    .product-btn {
      background: var(--black-color);
      color: white;
      padding: 1rem 2rem;
      border-radius: 0.5rem;
      font-size: 1.4rem;
      cursor: pointer;
    }

    @media (max-width: 900px) {
      .products-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .products-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header class="header">

  <a href="index.html" class="logo">
    <img src="images/logo.png" alt="logo"/>
  </a>

  <nav class="navbar">
    <a href="index.html">Hjem</a>
    <a href="about.html">Om Oss</a>
    <a href="menu.html">Meny</a>
    <a href="produkter.html" class="active">Produkter</a>
    <a href="review.html">Anmeldelse</a>
    <a href="contact.html">Kontakt</a>
    <a href="blogs.html">Blogger</a>
  </nav>

  <div class="buttons">
    <button id="search-btn">
      <i class="fas fa-search"></i>
    </button>

    <button id="cart-btn">
      <i class="fas fa-shopping-cart"></i>
      <span id="cartCount">0</span>
    </button>

    <button id="menu-btn">
      <i class="fas fa-bars"></i>
    </button>
  </div>

</header>

<section class="products-page">

  <h1 class="heading">our <span>products</span></h1>

  <div id="productsList" class="products-grid"></div>

</section>

<script src="js/script.js"></script>

<script>
const API_URL = "http://localhost:5025/api/Products";
const CART_KEY = "cartItems";
const DEFAULT_IMAGE = "images/menu-2.png";

const productsList = document.getElementById("productsList");
const cartCount = document.getElementById("cartCount");

let products = [];

function getCart(){
  return JSON.parse(localStorage.getItem(CART_KEY)) || [];
}

function saveCart(cart){
  localStorage.setItem(CART_KEY, JSON.stringify(cart));
  updateCartCount();
}

function updateCartCount(){
  const cart = getCart();

  const count = cart.reduce(function(total, item){
    return total + (item.quantity || 1);
  }, 0);

  cartCount.textContent = count;
}

function getImage(product){
  if(product.imageUrl && product.imageUrl.trim() !== ""){
    return product.imageUrl;
  }

  return DEFAULT_IMAGE;
}

async function loadProducts(){
  productsList.innerHTML = "";

  try{
    const response = await fetch(API_URL);

    if(!response.ok){
      productsList.innerHTML = "<p>Products not loaded</p>";
      return;
    }

    products = await response.json();

    products.forEach(function(product){

      const div = document.createElement("div");
      div.className = "product-card";

      div.innerHTML = `
        <img 
          src="${getImage(product)}"
          alt="${product.name}"
          onerror="this.onerror=null; this.src='${DEFAULT_IMAGE}';"
        >
        <h2>${product.name}</h2>
        <p>${product.description}</p>
        <strong>${product.price} Kr</strong>
        <button class="product-btn" onclick="addToCart(${product.id})">
          Add To Cart
        </button>
      `;

      productsList.appendChild(div);

    });

  }catch(e){
    productsList.innerHTML = "<p>Backend error</p>";
  }
}

function addToCart(id){

  const product = products.find(p => p.id === id);
  if(!product) return;

  const cart = getCart();

  const existing = cart.find(item => item.id === id);

  if(existing){
    existing.quantity++;
  }else{
    cart.push({
      id: product.id,
      name: product.name,
      price: product.price,
      image: getImage(product),
      quantity: 1
    });
  }

  saveCart(cart);
}

window.addEventListener("storage", updateCartCount);

document.addEventListener("DOMContentLoaded", function(){
  loadProducts();
  updateCartCount();
});
</script>

</body>
</html>
