<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reviews</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
  <link rel="stylesheet" href="styles/style.css" />

  <style>
    .review-container {
      padding: 3.5rem 7%;
    }

    .review-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5rem;
    }

    .form-box,
    .reviews-box {
      background: white;
      padding: 2.5rem;
      border-radius: 1.5rem;
    }

    .form-box h2,
    .reviews-box h2 {
      font-size: 2.4rem;
      margin-bottom: 1.5rem;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 1.2rem;
      margin-bottom: 1.2rem;
      border: 1px solid #ccc;
      border-radius: 0.6rem;
      font-size: 1.5rem;
      text-transform: none;
    }

    textarea {
      resize: vertical;
      min-height: 12rem;
    }

    .submit-btn {
      background: var(--black-color);
      color: white;
      padding: 1.2rem 2.5rem;
      border-radius: 0.6rem;
      cursor: pointer;
      font-size: 1.5rem;
    }

    #reviewMessage {
      margin-top: 1.5rem;
      font-weight: bold;
      font-size: 1.5rem;
    }

    .review-card {
      border: 1px solid #ddd;
      border-radius: 1rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .review-card h3 {
      font-size: 2rem;
      margin-bottom: 0.8rem;
    }

    .review-card p {
      font-size: 1.5rem;
      margin: 0.6rem 0;
    }

    .rating {
      color: var(--main-color);
      font-weight: bold;
    }

    @media (max-width: 800px) {
      .review-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header class="header">
  <a href="index.html" class="logo">
    <img src="images/logo.png" alt="logo">
  </a>

  <nav class="navbar">
    <a href="index.html">Hjem</a>
    <a href="about.html">Om Oss</a>
    <a href="menu.html">Meny</a>
    <a href="produkter.html">Produkter</a>
    <a href="review.html" class="active">Anmeldelse</a>
    <a href="contact.html">Kontakt</a>
    <a href="blogs.html">Blogger</a>
  </nav>

  <div class="buttons">
    <button id="search-btn" type="button">
      <i class="fas fa-search"></i>
    </button>

    <button id="cart-btn" type="button" onclick="window.location.href='menu.html#cart'">
      <i class="fas fa-shopping-cart"></i>
      <span id="cartCount">0</span>
    </button>

    <button id="menu-btn" type="button">
      <i class="fas fa-bars"></i>
    </button>
  </div>
</header>

<main class="review-container">
  <h1 class="heading">customer <span>reviews</span></h1>

  <div class="review-layout">
    <div class="form-box">
      <h2>Write a Review</h2>

      <form id="reviewForm">
        <input type="text" id="customerName" placeholder="Your Name" required>

        <select id="rating" required>
          <option value="">Choose Rating</option>
          <option value="1">1 Star</option>
          <option value="2">2 Stars</option>
          <option value="3">3 Stars</option>
          <option value="4">4 Stars</option>
          <option value="5">5 Stars</option>
        </select>

        <textarea id="comment" placeholder="Write your review..." required></textarea>

        <button class="submit-btn" type="submit">Send Review</button>
      </form>

      <p id="reviewMessage"></p>
    </div>

    <div class="reviews-box">
      <h2>Customer Reviews</h2>
      <div id="reviewsList"></div>
    </div>
  </div>
</main>

<script src="js/script.js"></script>

<script>
  const API_URL = "http://localhost:5025/api/Reviews";
  const CART_KEY = "cartItems";

  const reviewForm = document.getElementById("reviewForm");
  const reviewsList = document.getElementById("reviewsList");
  const reviewMessage = document.getElementById("reviewMessage");
  const cartCount = document.getElementById("cartCount");

  function getCart() {
    return JSON.parse(localStorage.getItem(CART_KEY)) || [];
  }

  function updateCartCount() {
    const cart = getCart();

    const count = cart.reduce(function(total, item) {
      return total + (item.quantity || 1);
    }, 0);

    cartCount.textContent = count;
  }

  async function loadReviews() {
    try {
      const response = await fetch(API_URL);

      if (!response.ok) {
        reviewsList.innerHTML = "<p>Could not load reviews.</p>";
        return;
      }

      const reviews = await response.json();

      reviewsList.innerHTML = "";

      if (reviews.length === 0) {
        reviewsList.innerHTML = "<p>No reviews yet.</p>";
        return;
      }

      reviews.forEach(function(review) {
        const card = document.createElement("div");
        card.className = "review-card";

        card.innerHTML = `
          <h3>${review.customerName}</h3>
          <p class="rating">Rating: ${review.rating} / 5</p>
          <p>${review.comment}</p>
        `;

        reviewsList.appendChild(card);
      });
    } catch (error) {
      reviewsList.innerHTML = "<p>Backend connection error.</p>";
      console.error(error);
    }
  }

  reviewForm.addEventListener("submit", async function(e) {
    e.preventDefault();

    const review = {
      customerName: document.getElementById("customerName").value,
      rating: Number(document.getElementById("rating").value),
      comment: document.getElementById("comment").value
    };

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(review)
      });

      if (response.ok) {
        reviewMessage.textContent = "Review created successfully!";
        reviewMessage.style.color = "green";
        reviewForm.reset();
        loadReviews();
      } else {
        const error = await response.text();
        reviewMessage.textContent = "Review failed: " + error;
        reviewMessage.style.color = "red";
      }
    } catch (error) {
      reviewMessage.textContent = "Backend connection error!";
      reviewMessage.style.color = "red";
      console.error(error);
    }
  });

  window.addEventListener("storage", updateCartCount);

  document.addEventListener("DOMContentLoaded", function() {
    updateCartCount();
    loadReviews();
  });
</script>

</body>
</html>
